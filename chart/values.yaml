replicaCount: 1

image:
  repository: ghcr.io/briangtn/blue-prince-note-helper
  tag: mas
  pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: blueprince.example.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  # Volume partagé par la DB SQLite et la photothèque (dossier uploads).
  size: 100Gi

# Garde-fou applicatif : refuse les imports au-delà de cette taille cumulée de
# photos (octets). Aligné par défaut sur le volume (100 Go).
storage:
  limitBytes: 107374182400

auth:
  roUser: ""
  roPass: ""
  rwUser: ""
  rwPass: ""

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
